<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>PrimeFaces Test</title>
    <h:outputStylesheet library="css" name="dark-mode-global.css"/>
    <script type="text/javascript">
        (function () {
            try {
                var savedTheme = null;
                if (window.localStorage) {
                    savedTheme = window.localStorage.getItem("btk.theme.global");
                }
                if (savedTheme === "dark") {
                    document.documentElement.classList.add("theme-dark");
                }
            } catch (e) {
                // Ignore theme preload errors.
            }
        })();
    </script>
</h:head>

<h:body styleClass="index-page">

<h:form>

    <h2>PrimeFaces Example</h2>

    <p:commandButton value="Click Me" action="#{helloBean.sayHello}" update="msg"/>

    <h:outputText id="msg" value="#{helloBean.message}"/>

</h:form>

</h:body>
</html>
