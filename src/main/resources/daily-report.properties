# Daily executive report configuration
# Override with system properties or environment variables in production.

btk.daily.report.enabled=true
btk.daily.report.schedule.hour=7
btk.daily.report.schedule.minute=30
btk.daily.report.timezone=Africa/Tunis

# Comma-separated recipient list. Keep empty here and set in deployment.
btk.daily.report.recipients=Ramez.WERFELLI@chakira-distribution.com

btk.daily.report.from=no-reply@btk.local
btk.daily.report.subject.prefix=[BTK]

# Preferred mail session (WildFly default)
btk.daily.report.mail.jndi=java:jboss/mail/Default

# SMTP fallback (used only if JNDI session is unavailable)
btk.daily.report.mail.smtp.host=
btk.daily.report.mail.smtp.port=25
btk.daily.report.mail.smtp.username=
btk.daily.report.mail.smtp.password=
btk.daily.report.mail.smtp.starttls=true
